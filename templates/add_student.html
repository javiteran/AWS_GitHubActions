<!DOCTYPE html>
<html>
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

<head>
	<title>{{ _('Add Student') }}</title>
</head>
<body>
	{% include 'menu.html' %}
	<div class="form-container">
		<div class="form-header">
			<h1>👥 {{ _('Add New Student') }}</h1>
			<p>{{ _('Fill in the student information below') }}</p>
		</div>
		<form method="POST" action="/add_student" class="modern-form">
			<div class="form-group">
				<label for="name">👤 {{ _('First Name') }}:</label>
				<input type="text" id="name" name="name" required placeholder="{{ _('Enter first name') }}">
			</div>
			<div class="form-group">
				<label for="surname">📝 {{ _('Surname') }}:</label>
				<input type="text" id="surname" name="surname" required placeholder="{{ _('Enter surname') }}">
			</div>
			<div class="form-group">
				<label for="nameclass">🏛️ {{ _('Class') }}:</label>
				<input type="text" id="nameclass" name="nameclass" required placeholder="{{ _('e.g., 1A, 2B') }}">
			</div>
			<div class="form-group">
				<label for="note">📊 {{ _('Grade/Note') }}:</label>
				<input type="number" id="note" name="note" required placeholder="0-10" min="0" max="10" step="0.1">
			</div>
			<div class="form-actions">
				<input type="submit" value="➕ {{ _('Add Student') }}" class="btn-submit">
				<a href="/students" class="btn-cancel">🚫 {{ _('Cancel') }}</a>
			</div>
		</form>
	</div>
</body>
</html>
